<!DOCTYPE html>
<html>
<head>
  <title>Here I will implement a provisionary online board painter</title>
</head>
<body>
  <h1>It works!</h1>
  <p>This page is served from /var/www/dev/mysite/onlineboardpainter/index.html on dev.ijamsterdam.nl</p>
  <p>Date: 19 April 2026</p>

  <button onclick="callApi()">Say Hello (FastAPI)</button>
  <p id="api-result"></p>
  <script>
  function callApi() {
    fetch('/onlineboardpainter/api/makeboard')
      .then(response => response.json())
      .then(data => {
        document.getElementById('api-result').innerText = data.message;
      })
      .catch(err => {
        document.getElementById('api-result').innerText = 'Error: ' + err;
      });
  }
  </script>
</body>
</html>
