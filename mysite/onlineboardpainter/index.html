<!DOCTYPE html>
<html>
<head>
  <title>Online board painter</title>
  <link rel="icon" href="/myicon.ico" type="image/x-icon">
</head>
<body>
  <h1>Online boardpainter tool</h1>
  <h2>for Chess variants, Chu Shogi and large Shogi variants</h2>

  <!-- Cookie consent banner -->
  <div id="cookie-consent-banner" style="display:none; background:#eee; border:1px solid #ccc; padding:10px; margin-bottom:10px;">
    This site uses a cookie to remember if you are not a bot. Do you accept this?
    <button onclick="acceptCookieConsent()">Accept</button>
    <button onclick="declineCookieConsent()">Decline</button>
  </div>

  <!-- Bot defense section -->
  <div id="bot-defense-section">
    <h3>Bot or Human?</h3>
    <img src="../dumbcatcha.png" alt="dumbcatcha" style="vertical-align:middle; margin-bottom:8px;"><br>
    <textarea id="user-or-bot" rows="2" cols="60" placeholder="Bot or human?"></textarea><br>
    <button id="auth-btn" onclick="authenticateUser()">Proof</button>
    <p id="auth-result"></p>
  </div>

  <label for="contextSelect">Context:</label>
  <select id="contextSelect" name="context">
    <option value="chess" selected>Chess</option>
    <option value="shogi">Shogi</option>
  </select>
  <br>
  <label for="theme-select">Theme:</label>
  <select id="theme-select" name="theme">
    <!-- Will be populated by JS -->
  </select>
  <br>

  <h2>Paste or type your text below:</h2>
  <textarea id="user-text" rows="15" cols="60" placeholder="Paste or type your FEN here (JSON also accepted)"></textarea><br>
  <p>
    Find the JSON examples on <a href="https://github.com/evert823/onlineboardpainter/tree/main/resources/position_json_examples" target="_blank">GitHub</a>.
  </p>
  <p>
    Back to <a href="https://vps1.mcs2web.com/">overview</a>.
  </p>
  <button id="send-btn" onclick="sendText4boardpainter()" disabled>Send to API</button>
  <p id="text-api-result"></p>

  <div id="image-section" style="display:none;">
    <p>Image filename: <span id="image-filename"></span></p>
    <img id="board-image" src="" alt="Board image" style="max-width:400px; display:block; margin-bottom:10px;">
    <a id="download-link" href="#" download style="display:inline-block;">
      <button id="download-btn" type="button">Download Image</button>
    </a>
  </div>

<script>
let currentImageFile = "";
let isAuthenticated = false;
let cookieConsentGiven = false;

// Theme options for each context
const themeOptions = {
  chess: [
    { value: "classicwood", label: "Classic wood" },
    { value: "green", label: "Green (Bulldog classic style)" }
  ],
  shogi: [
    { value: "set2", label: "2 kanji" },
    { value: "set1", label: "1 kanji" }
  ]
};

// API endpoints for each context
const apiEndpoints = {
  chess: '/onlineboardpainter/api/makeboard',
  shogi: '/onlineboardpainter/api/makechuboard'
};

// Populate theme dropdown based on context
function populateThemeOptions(context) {
  const themeSelect = document.getElementById('theme-select');
  themeSelect.innerHTML = '';
  themeOptions[context].forEach(opt => {
    const option = document.createElement('option');
    option.value = opt.value;
    option.textContent = opt.label;
    themeSelect.appendChild(option);
  });
}

// Set API endpoint based on context
function setApiEndpoint(context) {
  window.sendTextApiEndpoint = apiEndpoints[context];
}

// Handle context change
document.addEventListener('DOMContentLoaded', function() {
  const contextSelect = document.getElementById('contextSelect');
  // Set initial state
  populateThemeOptions(contextSelect.value);
  setApiEndpoint(contextSelect.value);

  contextSelect.addEventListener('change', function() {
    populateThemeOptions(this.value);
    setApiEndpoint(this.value);
  });
});
</script>
<script src="../common.js"></script>
</body>
</html>
