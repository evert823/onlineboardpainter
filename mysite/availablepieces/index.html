<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Piece Table</title>
  <link rel="icon" href="/myicon.ico" type="image/x-icon">
  <style>
    body { font-family: Arial, sans-serif; font-size: 16px; margin: 16px; }
    h2 { font-size: 16px; margin: 8px 0; }
    /* left-align table by default (laptop/desktop) */
    table { border-collapse: collapse; width: 100%; max-width: 420px; margin: 0; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: center; vertical-align: middle; font-size: 16px; }
    img.piece { max-width: 90px; max-height: 98px; width: auto; height: auto; display: block; margin: 4px auto 0; }

    /* Mobile-only: make table occupy ~70% of viewport and center it */
    @media (max-width: 600px) {
      table { max-width: 70vw; margin: 0 auto; }  /* center on mobile */
      body { font-size: 18px; margin: 12px; }
      h2 { font-size: 18px; }
      th, td { font-size: 18px; padding: 8px; }
      img.piece { max-width: 140px; max-height: 156px; }
    }
  </style>
</head>
<body>
  <h2>Available pieces</h2>
  <table id="piecesTable" aria-label="Available pieces table"></table>

  <script>
    const items = [
      { piecesymbol: "L", piecename: "Angel", imagefilepath: "/home/administrator/onlineboardpainter/resources/pieceimages_classicwood/whiteangelonwhite.png" },
      { piecesymbol: "A", piecename: "Archbishop", imagefilepath: "/home/administrator/onlineboardpainter/resources/pieceimages_classicwood/whitearchbishoponwhite.png" },
      { piecesymbol: "B", piecename: "Bishop", imagefilepath: "/home/administrator/onlineboardpainter/resources/pieceimages_classicwood/whitebishoponwhite.png" },
      { piecesymbol: "Bf", piecename: "Buffalo", imagefilepath: "/home/administrator/onlineboardpainter/resources/pieceimages_classicwood/whitebuffaloonwhite.png" }
    ];

    const table = document.getElementById("piecesTable");

    // header
    const thead = document.createElement('thead');
    const htr = document.createElement('tr');
    ["Abbr", "PieceName", "Image"].forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      htr.appendChild(th);
    });
    thead.appendChild(htr);
    table.appendChild(thead);

    // body
    const tbody = document.createElement('tbody');
    items.forEach(it => {
      const tr = document.createElement('tr');

      const tdShort = document.createElement('td');
      tdShort.textContent = it.piecesymbol;
      tr.appendChild(tdShort);

      const tdName = document.createElement('td');
      tdName.textContent = it.piecename;
      tr.appendChild(tdName);

      const tdImg = document.createElement('td');
      const img = document.createElement('img');
      img.className = 'piece';
      img.alt = `${it.piecesymbol} ${it.piecename}`;
      img.src = `/onlineboardpainter/api/pieceimage?image_file_path=${encodeURIComponent(it.imagefilepath)}`;
      tdImg.appendChild(img);
      tr.appendChild(tdImg);

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
  </script>
</body>
</html>
