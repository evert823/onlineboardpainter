<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Piece Table</title>
  <link rel="icon" href="/images/myicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/availablepieces.css">
</head>
<body>
  <h1>Available pieces</h1>
  <p><a href="https://vps1.mcs2web.com/">Overview</a></p>
  <br>
  <div class="top-controls">
    <label for="contextSelect">Context:</label>
    <select id="contextSelect" name="context">
      <option value="chess">Chess</option>
      <option value="shogi">Shogi</option>
    </select>

    <label for="themeSelect">Theme:</label>
    <select id="themeSelect" name="theme"></select>
  </div>

  <table id="piecesTable" aria-label="Available pieces table"></table>

  <script>
    const contextSelect = document.getElementById('contextSelect');
    const themeSelect = document.getElementById('themeSelect');
    const THEMES_BY_CONTEXT = {
      chess: [
        { value: 'classicwood', label: 'Classic Wood' },
        { value: 'green', label: 'Green' }
      ],
      shogi: [
        { value: 'set2', label: 'Set 2' },
        { value: 'set1', label: 'Set 1' }
      ]
    };

    function populateThemesFor(context, preserveSelection = false) {
      const list = THEMES_BY_CONTEXT[context] || [];
      const prev = preserveSelection ? themeSelect.value : null;
      themeSelect.innerHTML = '';
      list.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.label;
        themeSelect.appendChild(o);
      });
      if (preserveSelection && prev) {
        const found = Array.from(themeSelect.options).some(o => o.value === prev);
        if (found) themeSelect.value = prev;
      }
      if (!themeSelect.value && themeSelect.options.length) themeSelect.selectedIndex = 0;
    }

    async function loadPieces() {
      const table = document.getElementById('piecesTable');
      table.innerHTML = ''; // clear

      const payload = {
        context: contextSelect ? contextSelect.value : "chess",
        theme: themeSelect ? themeSelect.value : "classicwood"
      };

      let resp;
      try {
        resp = await fetch('/onlineboardpainter/api/providepiecelist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        table.textContent = 'Error: could not contact API';
        return;
      }

      if (!resp.ok) {
        table.textContent = 'Error: API returned ' + resp.status;
        return;
      }

      const json = await resp.json();
      const items = (json && json.piecelist_dict && json.piecelist_dict.piecedefinitions) || [];

      const thead = document.createElement('thead');
      const htr = document.createElement('tr');
      ['Abbr', 'PieceName', 'Image'].forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        htr.appendChild(th);
      });
      thead.appendChild(htr);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      items.forEach(it => {
        const tr = document.createElement('tr');

        const tdShort = document.createElement('td');
        tdShort.textContent = it.piecesymbol || '';
        tr.appendChild(tdShort);

        const tdName = document.createElement('td');
        tdName.textContent = it.piecename || '';
        tr.appendChild(tdName);

        const tdImg = document.createElement('td');
        const img = document.createElement('img');
        img.className = 'piece';
        img.alt = (it.piecesymbol ? it.piecesymbol + ' ' : '') + (it.piecename || '');
        if (it.imagefilepath) {
          img.src = '/onlineboardpainter/api/pieceimage?image_file_path=' + encodeURIComponent(it.imagefilepath);
        } else {
          img.alt = 'no image';
        }
        tdImg.appendChild(img);
        tr.appendChild(tdImg);

        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
    }

    // update themes when context changes, then reload pieces
    contextSelect.addEventListener('change', () => {
      populateThemesFor(contextSelect.value, /*preserveSelection=*/false);
      loadPieces();
    });

    // reload when theme changes
    themeSelect.addEventListener('change', loadPieces);

    // initial setup + load
    populateThemesFor(contextSelect.value, /*preserveSelection=*/true);
    loadPieces();
  </script>
</body>
</html>
